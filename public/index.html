<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Engineering Toolkit | Team FourMinds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #050505;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-hover: rgba(255, 255, 255, 0.05);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --accent-primary: #818cf8;
            --accent-secondary: #c084fc;
            --success: #34d399;
            --sidebar-width: 260px;
            --gradient-1: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Outfit', sans-serif; background:var(--bg-body); color:var(--text-main); display:flex; height:100vh; overflow:hidden; }

        /* Sidebar */
        aside { width:var(--sidebar-width); background:rgba(0,0,0,0.5); border-right:1px solid var(--glass-border); display:flex; flex-direction:column; }
        .sidebar-brand { padding:32px 24px; font-weight:800; font-size:1.2rem; background:var(--gradient-1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-item { padding:14px 24px; color:var(--text-muted); cursor:pointer; font-weight:500; font-size:0.9rem; transition:0.2s; display:flex; gap:12px; align-items:center; }
        .nav-item:hover, .nav-item.active { color:var(--text-main); background:var(--glass-bg); }
        .nav-item.active { border-right:3px solid var(--accent-primary); color:var(--accent-primary); }

        /* Main */
        main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        header { padding:24px 48px; border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center; }
        .content { flex:1; overflow-y:auto; padding:48px; }

        /* General UI */
        .glass-card { background:var(--glass-bg); backdrop-filter:blur(20px); border:1px solid var(--glass-border); border-radius:24px; padding:32px; margin-bottom:24px; }
        .btn { padding:12px 24px; border-radius:12px; font-weight:700; cursor:pointer; font-family:inherit; border:none; transition:0.2s; font-size:0.85rem; }
        .btn-primary { background:var(--gradient-1); color:white; }
        .btn-outline { background:transparent; border:1px solid var(--glass-border); color:var(--text-main); }
        .btn:hover { transform:translateY(-2px); filter:brightness(1.1); }
        
        input, textarea, select { width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); border-radius:12px; padding:12px 16px; color:white; font-family:inherit; margin-bottom:16px; outline:none; }
        textarea { resize: vertical; }
        input:focus { border-color:var(--accent-primary); }
        label { display:block; margin-bottom:8px; font-size:0.8rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; }

        .badge { padding:4px 10px; border-radius:6px; font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:0.05em; }
        .badge-success { background:var(--success); color:#000; }
        .badge-accent { background:var(--accent-primary); color:white; }

        .hidden { display:none; }
        
        /* Grid */
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
        
        /* Version List */
        .version-row { display:flex; justify-content:space-between; align-items:center; padding:12px; background:rgba(255,255,255,0.02); border-radius:12px; margin-bottom:8px; }
        
        /* Template Item */
        .template-item { padding:16px; border:1px solid var(--glass-border); border-radius:16px; margin-bottom:12px; }

        .output-quote { background: rgba(0,0,0,0.3); border-left: 3px solid var(--accent-primary); padding: 20px; border-radius: 0 12px 12px 0; color: #cbd5e1; font-size: 0.95rem; line-height: 1.7; font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body>
    <aside>
        <div class="sidebar-brand">FOURMINDS.PROMPT</div>
        <div class="nav-item active" onclick="showTab('prompts')">Prompts Manager</div>
        <div class="nav-item" onclick="showTab('suites')">Test Suites</div>
        <div class="nav-item" onclick="showTab('execute')">Execution Engine</div>
        <div class="nav-item" onclick="showTab('templates')">Template Library</div>
    </aside>

    <main>
        <header>
            <h2 id="tab-title">Prompt Manager</h2>
            <div class="btn-outline">Team FourMinds Edition</div>
        </header>

        <div class="content">
            <!-- Tab: Prompts -->
            <div id="tab-prompts">
                <div class="grid-2">
                    <div class="glass-card">
                        <label>Create New Prompt</label>
                        <input type="text" id="new-prompt-title" placeholder="Prompt Title (e.g., Marketing Summary)">
                        <textarea id="new-prompt-content" rows="4" placeholder="Initial prompt text..."></textarea>
                        <button class="btn btn-primary" onclick="createNewPrompt()">Initialize Prompt</button>
                    </div>
                    <div class="glass-card">
                        <label>Manage Existing Prompts</label>
                        <div id="prompt-list" style="max-height: 250px; overflow-y: auto;">
                            <!-- Prompts will load here -->
                        </div>
                    </div>
                </div>

                <div id="prompt-editor" class="glass-card hidden">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                        <h3 id="editing-title">Prompt Title</h3>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-primary" style="padding: 8px 16px;" onclick="addNewVersion()">Save Next Version</button>
                            <button class="btn btn-outline" style="padding: 8px 16px;" onclick="closeEditor()">Close</button>
                        </div>
                    </div>
                    <label>Edit Content (Creates vNext)</label>
                    <textarea id="version-content" rows="6"></textarea>
                    
                    <hr style="margin:24px 0; opacity:0.1;">
                    <label>Version History & Rollback System</label>
                    <div id="version-history"></div>
                </div>
            </div>

            <!-- Tab: Suites -->
            <div id="tab-suites" class="hidden">
                <div class="glass-card">
                    <label>Create Test Suite</label>
                    <input type="text" id="new-suite-title" placeholder="Suite Title (e.g., Accuracy Benchmarks)">
                    <button class="btn btn-primary" onclick="createSuite()">Create Suite</button>
                </div>
                <div class="glass-card">
                    <label>Active Test Suites</label>
                    <div id="suite-list"></div>
                </div>
            </div>

            <!-- Tab: Execute -->
            <div id="tab-execute" class="hidden">
                <div class="glass-card">
                    <label>Pipeline Configuration</label>
                    <div class="grid-2">
                        <div>
                            <label>Select Prompt</label>
                            <select id="exec-prompt-select" onchange="loadPromptVersionsForExec()"></select>
                        </div>
                        <div>
                            <label>Select Version</label>
                            <select id="exec-version-select"></select>
                        </div>
                    </div>
                    <div class="grid-2" style="margin-top: 16px;">
                        <div>
                            <label>Select Suite (Optional)</label>
                            <select id="exec-suite-select">
                                <option value="">No Suite (Manual Only)</option>
                            </select>
                        </div>
                        <div>
                            <label>Intelligence Model</label>
                            <select id="exec-model-select">
                                <option value="GPT-4o">GPT-4o</option>
                                <option value="Claude 3.5">Claude 3.5 Sonnet</option>
                                <option value="Gemini 1.5">Gemini 1.5 Pro</option>
                            </select>
                        </div>
                    </div>
                    <label style="margin-top: 16px;">Dynamic Input Vector</label>
                    <textarea id="exec-input" rows="3" placeholder="Enter topic or text..."></textarea>
                    <button class="btn btn-primary" style="width:100%;" onclick="executePipeline()">Execute Optimization Pipeline</button>
                </div>
                <div id="execution-output"></div>
            </div>

            <!-- Tab: Templates -->
            <div id="tab-templates" class="hidden">
                <div class="glass-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <label style="margin-bottom: 0;">Template Library</label>
                        <button class="btn btn-outline" style="padding: 8px 16px;" onclick="loadTemplates()">Refresh</button>
                    </div>
                    <div id="template-list"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentPromptId = null;

        function showTab(tabId) {
            document.querySelectorAll('.content > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            // Handle cross-tab event correctly
            const activeNav = Array.from(document.querySelectorAll('.nav-item')).find(n => n.innerText.toLowerCase().includes(tabId));
            if (activeNav) activeNav.classList.add('active');
            
            document.getElementById('tab-title').innerText = tabId.charAt(0).toUpperCase() + tabId.slice(1) + ' Manager';

            if (tabId === 'prompts') loadPrompts();
            if (tabId === 'suites') loadSuites();
            if (tabId === 'execute') populateExecSelects();
            if (tabId === 'templates') loadTemplates();
        }

        async function loadPrompts() {
            const res = await fetch('/api/prompts');
            const prompts = await res.json();
            const list = document.getElementById('prompt-list');
            list.innerHTML = prompts.map(p => `
                <div class="version-row" style="cursor:pointer;" onclick="openEditor('${p.id}')">
                    <span>${p.title}</span>
                    <span class="badge badge-accent">${p.versionCount} Versions</span>
                </div>
            `).join('');
        }

        async function createNewPrompt() {
            const title = document.getElementById('new-prompt-title').value;
            const content = document.getElementById('new-prompt-content').value;
            if (!title || !content) return alert('Title and content required');
            
            await fetch('/api/prompts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            });
            document.getElementById('new-prompt-title').value = '';
            document.getElementById('new-prompt-content').value = '';
            loadPrompts();
            alert('Prompt Cluster Initialized.');
        }

        async function openEditor(id) {
            currentPromptId = id;
            const res = await fetch(`/api/prompts/${id}`);
            const prompt = await res.json();
            document.getElementById('editing-title').innerText = prompt.title;
            document.getElementById('prompt-editor').classList.remove('hidden');
            
            const history = document.getElementById('version-history');
            const versions = [...prompt.versions].reverse();
            history.innerHTML = versions.map((v, i) => `
                <div class="version-row">
                    <div>
                        <strong>${v.version}</strong>
                        <div style="font-size:0.75rem; color:var(--text-muted);">${new Date(v.createdAt).toLocaleString()}</div>
                    </div>
                    <div>
                        <button class="btn btn-outline" style="padding:4px 8px; margin-right:8px;" onclick="viewVersion(\`${escapeJs(v.content)}\`)">View</button>
                        <button class="btn btn-outline" style="padding:4px 8px; margin-right:8px;" onclick="saveAsTemplate('${id}', '${v.version}')">Save to Lib</button>
                        <button class="btn btn-primary" style="padding:4px 8px;" onclick="rollback('${v.version}')">Rollback</button>
                    </div>
                </div>
            `).join('');
            
            if (versions.length > 0) {
                document.getElementById('version-content').value = versions[0].content;
            }
        }

        function escapeJs(str) { return str.replace(/`/g, '\\`').replace(/\$/g, '\\$'); }

        function viewVersion(content) { alert("Version Content Content:\n\n" + content); }

        async function addNewVersion() {
            const content = document.getElementById('version-content').value;
            if (!content) return;
            await fetch(`/api/prompts/${currentPromptId}/version`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            openEditor(currentPromptId);
        }

        async function rollback(versionId) {
            if (!confirm(`Rollback to ${versionId}? Higher versions will be lost.`)) return;
            await fetch(`/api/prompts/${currentPromptId}/rollback`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ versionId })
            });
            openEditor(currentPromptId);
        }

        async function saveAsTemplate(promptId, versionId) {
            await fetch('/api/templates', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ promptId, versionId, averageScore: 15.0 })
            });
            alert('Added to Template Library.');
        }

        async function loadSuites() {
            const res = await fetch('/api/suites');
            const suites = await res.json();
            document.getElementById('suite-list').innerHTML = suites.map(s => `
                <div class="version-row">
                    <span>${s.title}</span>
                    <span class="badge badge-accent">${s.testCount} Tests</span>
                </div>
            `).join('');
        }

        async function createSuite() {
            const title = document.getElementById('new-suite-title').value;
            if (!title) return alert('Suite title required');
            await fetch('/api/suites', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title })
            });
            document.getElementById('new-suite-title').value = '';
            loadSuites();
        }

        async function populateExecSelects() {
            const pRes = await fetch('/api/prompts');
            const prompts = await pRes.json();
            document.getElementById('exec-prompt-select').innerHTML = prompts.map(p => `
                <option value="${p.id}">${p.title}</option>
            `).join('');
            
            const sRes = await fetch('/api/suites');
            const suites = await sRes.json();
            document.getElementById('exec-suite-select').innerHTML = '<option value="">Manual Input Only</option>' + suites.map(s => `
                <option value="${s.id}">${s.title}</option>
            `).join('');
            
            loadPromptVersionsForExec();
        }

        async function loadPromptVersionsForExec() {
            const id = document.getElementById('exec-prompt-select').value;
            if (!id) return;
            const res = await fetch(`/api/prompts/${id}`);
            const prompt = await res.json();
            document.getElementById('exec-version-select').innerHTML = prompt.versions.map(v => `
                <option value="${v.version}">${v.version}</option>
            `).join('');
        }

        async function executePipeline() {
            const promptId = document.getElementById('exec-prompt-select').value;
            const versionId = document.getElementById('exec-version-select').value;
            const model = document.getElementById('exec-model-select').value;
            const input = document.getElementById('exec-input').value;
            
            const outputDiv = document.getElementById('execution-output');
            outputDiv.innerHTML = '<div class="glass-card">Synchronizing Neural Modules...</div>';
            
            const res = await fetch('/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ input, model, promptId, versionId })
            });
            outputDiv.innerHTML = await res.text();
        }

        async function loadTemplates() {
            const res = await fetch('/api/templates');
            const templates = await res.json();
            document.getElementById('template-list').innerHTML = templates.map(t => `
                <div class="template-item">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <strong>${t.title}</strong>
                        <span class="badge badge-success">${t.versionId}</span>
                    </div>
                    <div class="output-quote" style="font-size:0.85rem; margin-top:8px;">${t.content}</div>
                    <div style="margin-top:12px; font-size:0.75rem; color:var(--text-muted);">Efficiency: ${t.averageScore} | Cluster ID: ${t.id}</div>
                </div>
            `).join('');
        }

        function closeEditor() { document.getElementById('prompt-editor').classList.add('hidden'); }

        loadPrompts();
    </script>
</body>
</html>
